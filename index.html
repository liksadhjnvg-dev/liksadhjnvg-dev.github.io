<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainingslog</title>
<style>body{margin:0;background:#070912;padding:12px 0;}</style>
</head>
<body>
<!-- Trainingslog: Push/Pull/Beine -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  #tl-root {
    --bg: #070912;
    --surface: #0e1420;
    --surface-2: #16202f;
    --text: #d9f6ff;
    --text-muted: #5f7a94;
    --accent: #00f0ff;
    --accent-dim: #072934;
    --accent2: #ff2bd6;
    --border: #1c2c40;
    --ok: #39ff8a;
    --warn: #ffe400;
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    background:
      linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px),
      var(--bg);
    background-size: 28px 28px, 28px 28px, 100% 100%;
    padding: 24px 16px 32px;
    border-radius: 4px;
    max-width: 780px;
    margin: 0 auto;
    border: 1px solid var(--border);
    box-shadow: 0 0 40px rgba(0,240,255,0.06) inset;
  }
  #tl-root * { box-sizing: border-box; }
  .tl-h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 800;
    font-size: 38px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0 0 20px;
    color: var(--accent);
    text-shadow: 0 0 8px rgba(0,240,255,0.6), 0 0 24px rgba(0,240,255,0.25);
  }
  .tl-sub { color: var(--text-muted); font-size: 13px; margin: 0 0 16px; font-family: 'Rajdhani', sans-serif; }
  .tl-toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tl-tool-btn {
    font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    background: none; color: var(--text-muted); border: 1px solid var(--border); border-radius: 2px;
    padding: 7px 11px; cursor: pointer;
  }
  .tl-tool-btn:hover { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px rgba(0,240,255,0.35); }
  .tl-tabs { display: flex; flex-direction: column; gap: 0; margin-bottom: 20px; }
  .tl-tab-group { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
  .tl-tab-group:last-child { margin-bottom: 0; }
  .tl-tab {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 10px 2px 12px;
    cursor: pointer;
    position: relative;
    text-align: center;
    min-height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.2;
    flex: 1;
  }
  .tl-tab.active { color: var(--accent); text-shadow: 0 0 6px rgba(0,240,255,0.7); }
  .tl-tab.active::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .tl-tab-stretch.active { color: #ccff00; text-shadow: 0 0 6px rgba(204,255,0,0.7); }
  .tl-tab-stretch.active::after { background: #ccff00; box-shadow: 0 0 8px #ccff00; }
  .tl-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--eq-color, var(--border));
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: -6px 0 16px -8px var(--eq-color, transparent);
  }
  .tl-card-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 10px; }
  .tl-head-main { display: flex; justify-content: space-between; align-items: baseline; flex: 1; gap: 12px; }
  .tl-ex-name { font-weight: 500; font-size: 15px; }
  .tl-ex-equip { color: var(--text-muted); font-size: 12px; margin-top: 1px; }
  .tl-ex-muscles { color: var(--text-muted); font-size: 11px; margin-top: 2px; }
  .tl-volume {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    white-space: nowrap;
  }
  .tl-e1rm { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); white-space: nowrap; margin-top: 2px; }
  .tl-best { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--warn); white-space: nowrap; margin-top: 2px; text-shadow: 0 0 6px rgba(255,228,0,0.5); }
  .tl-pr-badge { color: var(--warn); font-size: 11px; margin-left: 4px; filter: drop-shadow(0 0 4px rgba(255,228,0,0.7)); }
  .tl-equip-icon {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface-2); border: 1.5px solid var(--icon-color, var(--border));
    margin-left: 12px;
    box-shadow: 0 0 10px -2px var(--icon-color, transparent);
  }
  .tl-deload {
    margin-bottom: 12px; padding: 8px 10px; border-radius: 4px; background: rgba(255,228,0,0.06);
    border: 1px solid rgba(255,228,0,0.4); color: var(--warn); font-size: 12px; line-height: 1.5; box-shadow: 0 0 10px rgba(255,228,0,0.08);
  }
  .tl-inner-tabs { display: flex; gap: 4px; margin-bottom: 12px; background: var(--surface-2); border-radius: 3px; padding: 3px; }
  .tl-inner-tab {
    flex: 1; font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 500;
    background: none; color: var(--text-muted); border: none; border-radius: 2px;
    padding: 7px 4px; cursor: pointer;
  }
  .tl-inner-tab.active { background: var(--surface); color: var(--accent); box-shadow: 0 0 8px rgba(0,240,255,0.3); }
  .tl-panel { display: none; }
  .tl-panel.active { display: block; }
  .tl-set-row { display: grid; grid-template-columns: 24px 1fr 1fr 24px; gap: 8px; align-items: center; margin-bottom: 6px; }
  .tl-set-num { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-muted); text-align: center; }
  .tl-input {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 3px;
    padding: 8px 10px;
    width: 100%;
  }
  .tl-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 6px rgba(0,240,255,0.35); }
  .tl-input::placeholder { color: var(--text-muted); }
  .tl-del {
    background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; line-height: 1;
    padding: 4px;
  }
  .tl-del:hover { color: #ff3864; filter: drop-shadow(0 0 4px rgba(255,56,100,0.6)); }
  .tl-labels { display: grid; grid-template-columns: 24px 1fr 1fr 24px; gap: 8px; margin-bottom: 6px; }
  .tl-labels span { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
  .tl-add {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 500;
    background: var(--accent-dim);
    color: var(--accent);
    border: none;
    border-radius: 3px;
    padding: 8px 12px;
    cursor: pointer;
    margin-top: 4px;
  }
  .tl-add:hover { filter: brightness(1.15); }
  .tl-finish {
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 500;
    background: none; color: var(--ok); border: 1px solid var(--ok); border-radius: 3px;
    padding: 8px 12px; cursor: pointer; margin-top: 10px; width: 100%;
  }
  .tl-finish:hover { background: rgba(111,174,111,0.12); }
  .tl-status {
    font-size: 12px; color: var(--text-muted); text-align: right; margin-top: 4px; min-height: 16px;
  }
  .tl-status.saved { color: var(--ok); }
  .tl-loading { color: var(--text-muted); font-size: 13px; padding: 20px 0; text-align: center; }
  .tl-history-empty { color: var(--text-muted); font-size: 12px; }
  .tl-hblock { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px dashed var(--border); }
  .tl-hblock:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .tl-hrow-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .tl-hdate { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
  .tl-hsummary { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent); text-align: right; }
  .tl-hsets { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .tl-guide ol { margin: 0; padding-left: 20px; }
  .tl-guide li { font-size: 13px; line-height: 1.6; color: var(--text); margin-bottom: 6px; }
  .tl-guide li::marker { color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
  .tl-goal-row { display: flex; align-items: center; gap: 8px; }
  .tl-goal-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .tl-goal-input { width: 70px; }
  .tl-goal-save {
    font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 500;
    background: var(--accent-dim); color: var(--accent); border: none; border-radius: 2px;
    padding: 6px 10px; cursor: pointer;
  }
  .tl-goal-progress-wrap { margin-top: 12px; display: none; }
  .tl-goal-progress-track { background: var(--surface-2); border-radius: 4px; height: 8px; overflow: hidden; }
  .tl-goal-progress-fill { background: var(--accent); height: 100%; border-radius: 4px; }
  .tl-goal-progress-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .tl-newex-toggle {
    font-family: 'Orbitron', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 0.3px;
    text-transform: uppercase; background: var(--surface); color: var(--accent);
    border: 1px dashed var(--accent); border-radius: 4px; padding: 14px; width: 100%; cursor: pointer;
    margin-top: 4px;
  }
  .tl-newex-toggle:hover { background: var(--accent-dim); }
  .tl-newex-form {
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    padding: 16px; margin-top: 4px; display: none;
  }
  .tl-newex-form.open { display: block; }
  .tl-form-row { margin-bottom: 12px; }
  .tl-form-row label { display: block; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 6px; }
  .tl-form-row select, .tl-form-row input { font-family: 'Rajdhani', sans-serif; }
  .tl-form-actions { display: flex; gap: 8px; margin-top: 4px; }
  .tl-form-submit {
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 500;
    background: var(--accent); color: #002026; border: none; border-radius: 2px; box-shadow: 0 0 10px rgba(0,240,255,0.5);
    padding: 9px 14px; cursor: pointer;
  }
  .tl-form-cancel {
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 500;
    background: none; color: var(--text-muted); border: 1px solid var(--border); border-radius: 3px;
    padding: 9px 14px; cursor: pointer;
  }
  .tl-overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .tl-overview-card {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 4px solid var(--eq-color, var(--border));
    border-radius: 4px;
    padding: 14px 16px;
    box-shadow: -6px 0 16px -8px var(--eq-color, transparent);
  }
  .tl-overview-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .tl-overview-name { font-weight: 500; font-size: 14px; }
  .tl-overview-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .tl-overview-muscles { color: var(--text-muted); font-size: 11px; margin-top: 2px; }
  .tl-overview-empty { color: var(--text-muted); font-size: 12px; padding: 4px 0; }
  .tl-overview-section {
    font-family: 'Orbitron', sans-serif; font-weight: 600; font-size: 15px; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--accent); margin: 22px 0 10px;
    border-bottom: 1px solid var(--border); padding-bottom: 6px;
  }
  .tl-overview-section:first-child { margin-top: 0; }
  .tl-tile-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  @media (min-width: 560px) {
    .tl-tile-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 760px) {
    .tl-tile-grid { grid-template-columns: repeat(4, 1fr); }
  }
  .tl-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--eq-color, var(--border));
    border-radius: 4px;
    padding: 12px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    text-align: center;
    cursor: pointer;
    box-shadow: -4px 0 12px -8px var(--eq-color, transparent);
    transition: box-shadow 0.15s ease, transform 0.1s ease;
  }
  .tl-tile:hover, .tl-tile:focus-visible {
    box-shadow: 0 0 12px -2px var(--eq-color, var(--accent)), -4px 0 12px -8px var(--eq-color, transparent);
    transform: translateY(-1px);
    outline: none;
  }
  .tl-tile-icon {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface-2); border: 1.5px solid var(--eq-color, var(--border));
    box-shadow: 0 0 10px -2px var(--eq-color, transparent);
  }
  .tl-tile-name { font-size: 12px; font-weight: 600; line-height: 1.3; color: var(--text); font-family: 'Rajdhani', sans-serif; }
  .tl-modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none;
    align-items: center; justify-content: center; z-index: 1000; padding: 20px;
  }
  .tl-modal-backdrop.open { display: flex; }
  .tl-modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    padding: 20px; max-width: 420px; width: 100%; color: var(--text); font-family: 'Rajdhani', sans-serif;
  }
  .tl-modal h3 { font-family: 'Orbitron', sans-serif; font-size: 16px; text-transform: uppercase; margin: 0 0 10px; }
  .tl-modal p { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin: 0 0 14px; }
  .tl-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .tl-detail-modal {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 4px solid var(--eq-color, var(--border));
    border-radius: 4px; padding: 20px; max-width: 560px; width: 100%;
    color: var(--text); font-family: 'Rajdhani', sans-serif;
    box-shadow: 0 0 30px -6px var(--eq-color, transparent);
  }
  .tl-detail-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 4px; }
  .tl-detail-name { font-family: 'Orbitron', sans-serif; font-size: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tl-detail-close {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 2px; width: 28px; height: 28px; cursor: pointer; font-size: 16px; line-height: 1; flex-shrink: 0;
  }
  .tl-detail-close:hover { color: var(--accent); border-color: var(--accent); }
  .tl-detail-equip { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
  .tl-detail-muscles { color: var(--text-muted); font-size: 12px; margin-top: 2px; margin-bottom: 12px; }
  .tl-detail-best { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--warn); text-shadow: 0 0 6px rgba(255,228,0,0.5); margin-bottom: 10px; }
  .tl-timer {
    display: none;
    margin: 10px 0;
    background: var(--surface-2);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 10px 12px;
    box-shadow: 0 0 12px rgba(0,240,255,0.15);
  }
  .tl-timer.active { display: block; }
  .tl-timer-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .tl-timer-label { font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted); }
  .tl-timer-clock { font-family: 'IBM Plex Mono', monospace; font-size: 20px; color: var(--accent); text-shadow: 0 0 8px rgba(0,240,255,0.6); }
  .tl-timer-track { background: var(--bg); border-radius: 3px; height: 6px; overflow: hidden; margin-bottom: 8px; }
  .tl-timer-fill { background: var(--accent); height: 100%; box-shadow: 0 0 6px var(--accent); transition: width 1s linear; }
  .tl-timer-actions { display: flex; gap: 8px; }
  .tl-timer-btn {
    font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    background: none; color: var(--text-muted); border: 1px solid var(--border); border-radius: 2px;
    padding: 5px 10px; cursor: pointer;
  }
  .tl-timer-btn:hover { color: var(--accent); border-color: var(--accent); }
  .tl-footer { margin-top: 28px; padding-top: 14px; border-top: 1px solid var(--border); }
  .tl-footer-toggle {
    font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
    background: none; color: var(--text-muted); border: none; padding: 4px 0; cursor: pointer;
  }
  .tl-footer-toggle:hover { color: var(--accent); }
  .tl-footer #tl-footer-panel { display: none; margin-top: 10px; }
  .tl-footer #tl-footer-panel.open { display: flex; }

  /* --- Stretching module --- */
  .st-intro { color: var(--text-muted); font-size: 13px; margin: 0 0 16px; }
  .st-routine-card {
    background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent2);
    border-radius: 4px; padding: 18px; margin-bottom: 12px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: -6px 0 16px -8px var(--accent2);
  }
  .st-routine-card:hover { box-shadow: 0 0 12px -2px var(--accent2), -6px 0 16px -8px var(--accent2); }
  .st-routine-title { font-family: 'Orbitron', sans-serif; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 4px; color: var(--text); }
  .st-routine-meta { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-muted); margin: 0; }
  .st-routine-arrow { font-size: 22px; color: var(--accent2); margin-left: 12px; }
  .st-back-btn {
    background: none; border: none; color: var(--accent); font-family: 'Rajdhani', sans-serif;
    font-size: 14px; font-weight: 600; padding: 8px 0; margin-bottom: 10px; cursor: pointer;
  }
  .st-mode-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
  .st-mode-btn {
    flex: 1; padding: 9px 0; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600;
    border-radius: 2px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer;
  }
  .st-mode-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px rgba(0,240,255,0.25); }
  .st-runner-card {
    background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent2);
    border-radius: 4px; padding: 18px; box-shadow: -6px 0 16px -8px var(--accent2);
  }
  .st-meta-row { display: flex; justify-content: space-between; align-items: baseline; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .st-side { color: var(--accent2); font-weight: 600; }
  .st-side-lights {
    display: inline-flex; gap: 10px; padding: 6px 12px;
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 24px;
  }
  .st-light {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg); border: 1.5px solid var(--border);
    transition: background 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .st-light.lit {
    background: #ccff00; border-color: #ccff00;
    box-shadow: 0 0 14px #ccff00, 0 0 4px #ccff00 inset;
  }
  .st-light.current { border-color: #ccff00; animation: st-pulse 1.1s ease-in-out infinite; }
  @keyframes st-pulse {
    0%, 100% { box-shadow: 0 0 4px rgba(204,255,0,0.3); }
    50% { box-shadow: 0 0 16px rgba(204,255,0,0.9); }
  }
  .st-ex-name { font-family: 'Orbitron', sans-serif; font-size: 17px; text-transform: uppercase; letter-spacing: 0.3px; margin: 0 0 8px; color: var(--text); }
  .st-ex-desc { font-size: 14px; color: var(--text-muted); line-height: 1.55; margin: 0 0 18px; }
  .st-time-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }

  async get(key, shared) {
    const raw = localStorage.getItem('tl_' + key);
    if (raw === null) throw new Error('key not found');
    return { key: key, value: raw, shared: !!shared };
  },
  async set(key, value, shared) {
    localStorage.setItem('tl_' + key, value);
    return { key: key, value: value, shared: !!shared };
  },
  async delete(key, shared) {
    localStorage.removeItem('tl_' + key);
    return { key: key, deleted: true, shared: !!shared };
  },
  async list(prefix, shared) {
    const p = 'tl_' + (prefix || '');
    const keys = Object.keys(localStorage).filter(k => k.startsWith(p)).map(k => k.slice(3));
    return { keys: keys, prefix: prefix, shared: !!shared };
  }
};

  function slugify(name) {
    return name.toLowerCase()
      .replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue').replace(/ß/g, 'ss')
      .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  }

  function uniqueId(day, baseId) {
    const existing = new Set(DAYS[day].exercises.map(e => e.id));
    if (!existing.has(baseId)) return baseId;
    let n = 2;
    while (existing.has(baseId + '-' + n)) n++;
    return baseId + '-' + n;
  }

  function storageKey(day, id) { return 'sets:' + day + ':' + id; }
  function historyKey(day, id) { return 'history:' + day + ':' + id; }

  function legacyStorageKey(day, idx) { return 'sets:' + day + ':' + idx; }
  function legacyHistoryKey(day, idx) { return 'history:' + day + ':' + idx; }
  function customExercisesKey(day) { return 'custom-exercises:' + day; }

  function todayStr() {
    return new Date().toISOString().slice(0, 10);

  async function loadCustomExercises(day) {
    try {
      const res = await window.storage.get(customExercisesKey(day), false);
      return res && res.value ? JSON.parse(res.value) : [];
    } catch (e) {
      return [];
    }
  }

  async function saveCustomExercises(day) {
    const list = customExercisesCache[day] || [];
    try {
      await window.storage.set(customExercisesKey(day), JSON.stringify(list), false);
    } catch (e) { /* silent */ }
  }

  async function loadDay(day) {
    if (!DAYS[day]._merged) {
      const custom = await loadCustomExercises(day);
      customExercisesCache[day] = custom;
      custom.forEach(ex => DAYS[day].exercises.push(ex));
      DAYS[day]._merged = true;
    }
    const exercises = DAYS[day].exercises;
    const sets = [];
    const histories = [];
    for (let i = 0; i < exercises.length; i++) {
      const ex = exercises[i];
      let setsVal = null, histVal = null;
      try {
        const res = await window.storage.get(storageKey(day, ex.id), false);
        setsVal = res && res.value ? JSON.parse(res.value) : null;
      } catch (e) { /* not found under new key */ }
      try {
        const hres = await window.storage.get(historyKey(day, ex.id), false);
        histVal = hres && hres.value ? JSON.parse(hres.value) : null;
      } catch (e) { /* not found under new key */ }

      if (setsVal === null) {
        try {
          const legacyRes = await window.storage.get(legacyStorageKey(day, i), false);
          if (legacyRes && legacyRes.value) {
            setsVal = JSON.parse(legacyRes.value);
            await window.storage.set(storageKey(day, ex.id), legacyRes.value, false);
          }
        } catch (e) { /* nothing to migrate */ }
      }
      if (histVal === null) {
        try {
          const legacyHRes = await window.storage.get(legacyHistoryKey(day, i), false);
          if (legacyHRes && legacyHRes.value) {
            histVal = JSON.parse(legacyHRes.value);
            await window.storage.set(historyKey(day, ex.id), legacyHRes.value, false);
          }
        } catch (e) { /* nothing to migrate */ }
      }

      sets.push(setsVal || [{ reps: '', weight: '' }]);
      histories.push(histVal || []);
    }
    dataCache[day] = sets;
    historyCache[day] = histories;
  }

  const BAND_LEVELS = [
    { key: 'orange', label: 'Orange · leicht', color: '#ff8c1a' },
    { key: 'gruen', label: 'Grün · mittel', color: '#00ffb3' },
    { key: 'blau', label: 'Blau · schwer', color: '#00aaff' },
  ];
  function bandLevel(key) { return BAND_LEVELS.find(b => b.key === key); }

  function computeVolume(sets) {
    let total = 0;
    sets.forEach(s => { total += (parseFloat(s.reps) || 0) * (parseFloat(s.weight) || 0); });
    return total;
  }

  function computeMetric(ex, sets) {
    if (ex.type === 'band') {
      const totalReps = sets.reduce((sum, s) => sum + (parseFloat(s.reps) || 0), 0);
      return 'Wiederholungen: ' + totalReps;
    }
    return 'Volumen: ' + computeVolume(sets) + ' kg';
  }

  function calcE1RM(weight, reps) {
    const w = parseFloat(weight) || 0, r = parseFloat(reps) || 0;
    if (w <= 0 || r <= 0) return 0;
    return w * (1 + r / 30);
  }

  function lastSessionE1RM(ex, history) {
    if (ex.type === 'band' || !history || history.length === 0) return null;
    const last = history[history.length - 1];
    if (!last.sets || last.sets.length === 0) return null;
    let max = 0;
    last.sets.forEach(s => { const e = calcE1RM(s.weight, s.reps); if (e > max) max = e; });
    if (max <= 0) return null;
    return { value: Math.round(max * 10) / 10, date: last.date };
  }

  function e1rmLabel(ex, history) {
    const r = lastSessionE1RM(ex, history);
    if (!r) return ex.type === 'band' ? '' : 'e1RM: –';
    return 'e1RM (' + r.date + '): ' + r.value + ' kg';
  }

  function sessionValue(ex, entry) {
    if (!entry) return 0;
    if (ex.type === 'band') return entry.totalReps || 0;
    if (!entry.sets || entry.sets.length === 0) return entry.topWeight || 0;
    let max = 0;
    entry.sets.forEach(s => { const e = calcE1RM(s.weight, s.reps); if (e > max) max = e; });
    return Math.round(max * 10) / 10;
  }

  function actualBestSession(ex, history) {
    if (!history || history.length === 0) return null;
    if (ex.type === 'band') {
      const order = { orange: 1, gruen: 2, blau: 3 };
      let best = null;
      history.forEach(h => {
        const rank = order[h.topLevel] || 0;
        if (!best || rank > order[best.topLevel]) best = h;
      });
      return best ? { date: best.date, levelKey: best.topLevel } : null;
    }
    let best = null;
    history.forEach(h => {
      const w = h.topWeight || 0;

  // Custom eased smooth-scroll (native 'smooth' behavior can feel abrupt/jerky in this environment).
  function smoothScrollToElement(el, duration = 650, offset = 12) {
    if (!el) return;
    const startY = window.scrollY || window.pageYOffset;
    const targetY = Math.max(0, startY + el.getBoundingClientRect().top - offset);
    const distance = targetY - startY;
    if (Math.abs(distance) < 2) return;
    const startTime = performance.now();
    function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
    function step(now) {
      const t = Math.min(1, (now - startTime) / duration);
      window.scrollTo(0, startY + distance * easeInOutQuad(t));
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // --- Rest timer: Web Audio beep (no external file, works fully offline) ---
  let sharedAudioCtx = null;
  function getAudioCtx() {
    try {
      if (!sharedAudioCtx) sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (sharedAudioCtx.state === 'suspended') sharedAudioCtx.resume();
      return sharedAudioCtx;
    } catch (e) { return null; }
  }
  function playBeep(times) {
    const ctx = getAudioCtx();
    if (!ctx) return;
    for (let i = 0; i < times; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.value = 0.15;
      osc.connect(gain);
      gain.connect(ctx.destination);
      const startAt = ctx.currentTime + i * 0.22;
      osc.start(startAt);
      osc.stop(startAt + 0.15);
    }
    if (navigator.vibrate) { try { navigator.vibrate(times > 1 ? [150, 80, 150, 80, 150] : [150]); } catch (e) {} }
  }

  function formatClock(sec) {
    const m = Math.floor(sec / 60), s = sec % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  // Creates a rest-timer widget. Returns { el, start(seconds, label), stop() }; caller decides where to append `el`.
  function createTimerWidget() {
    const wrap = document.createElement('div');
    wrap.className = 'tl-timer';
    wrap.innerHTML = `
      <div class="tl-timer-row">
        <span class="tl-timer-label"></span>
        <span class="tl-timer-clock">00:00</span>
      </div>
      <div class="tl-timer-track"><div class="tl-timer-fill" style="width:100%"></div></div>
      <div class="tl-timer-actions">
        <button type="button" class="tl-timer-btn" data-action="skip">Überspringen</button>
      </div>
    `;
    const labelEl = wrap.querySelector('.tl-timer-label');
    const clockEl = wrap.querySelector('.tl-timer-clock');
    const fillEl = wrap.querySelector('.tl-timer-fill');
    let intervalId = null;
    let totalSec = 0, remaining = 0;

    function stop() {
      if (intervalId) { clearInterval(intervalId); intervalId = null; }
      wrap.classList.remove('active');
    }

    function tick() {
      remaining -= 1;
      if (remaining <= 0) {
        clockEl.textContent = '00:00';
        fillEl.style.width = '0%';
        stop();
        playBeep(totalSec >= 150 ? 3 : 2);
        return;
      }
      clockEl.textContent = formatClock(remaining);
      fillEl.style.width = Math.max(0, (remaining / totalSec) * 100) + '%';
    }

    function start(seconds, label) {
      stop();
      totalSec = seconds;
      remaining = seconds;
      labelEl.textContent = label;
      clockEl.textContent = formatClock(remaining);
      fillEl.style.width = '100%';
      wrap.classList.add('active');
      intervalId = setInterval(tick, 1000);
    }

    wrap.querySelector('[data-action="skip"]').onclick = stop;
    return { el: wrap, start, stop };
  }

  function linearRegression(values) {
    const n = values.length;
    if (n < 2) return null;
    let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
    for (let i = 0; i < n; i++) { sumX += i; sumY += values[i]; sumXY += i * values[i]; sumXX += i * i; }
    const denom = (n * sumXX - sumX * sumX);
    if (denom === 0) return null;
    const slope = (n * sumXY - sumX * sumY) / denom;
    const intercept = (sumY - slope * sumX) / n;
    return { slope, intercept };
  }

  function trendChartSvg(points, unit, color) {
    const width = 560, height = 140, padL = 36, padR = 16, padT = 14, padB = 22;
    const plotW = width - padL - padR, plotH = height - padT - padB;
    const defaultMax = unit === 'Wdh.' ? 100 : 50;

    function gridLines(minV, maxV, yFor) {
      return [0, 0.5, 1].map(t => {
        const v = minV + t * (maxV - minV);
        const y = yFor(v);
        return `<line x1="${padL}" y1="${y}" x2="${width - padR}" y2="${y}" stroke="#1c2c40" stroke-width="1"/><text x="4" y="${y + 4}" font-size="10" fill="#5f7a94" font-family="IBM Plex Mono, monospace">${Math.round(v)}</text>`;
      }).join('');
    }
    function axisFrame() {
      return `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + plotH}" stroke="#1c2c40" stroke-width="1"/><line x1="${padL}" y1="${padT + plotH}" x2="${width - padR}" y2="${padT + plotH}" stroke="#1c2c40" stroke-width="1"/>`;
    }

    if (points.length === 0) {
      const minV = 0, maxV = defaultMax;
      const yFor = (v) => padT + plotH - ((v - minV) / (maxV - minV || 1)) * plotH;
      return `<svg width="100%" viewBox="0 0 ${width} ${height}" style="overflow:visible;">
        ${gridLines(minV, maxV, yFor)}
        ${axisFrame()}
        <text x="${padL + plotW / 2}" y="${padT + plotH / 2 + 4}" font-size="12" fill="#5f7a94" font-family="Rajdhani, sans-serif" text-anchor="middle">Noch keine abgeschlossenen Einheiten.</text>
      </svg>`;
    }
    if (points.length === 1) {
      const v = points[0].value;
      const minV = 0, maxV = Math.max(v * 1.3, 1);
      const yFor = (v2) => padT + plotH - ((v2 - minV) / (maxV - minV || 1)) * plotH;
      const xMid = padL + plotW / 2;
      return `<svg width="100%" viewBox="0 0 ${width} ${height}" style="overflow:visible;">
        ${gridLines(minV, maxV, yFor)}
        ${axisFrame()}
        <circle cx="${xMid}" cy="${yFor(v)}" r="3" fill="${color}"/>
        <text x="${xMid}" y="${padT + 12}" font-size="10" fill="#5f7a94" font-family="Rajdhani, sans-serif" text-anchor="middle">${points[0].date}</text>
        <text x="${padL + plotW / 2}" y="${height - 4}" font-size="11" fill="#5f7a94" font-family="Rajdhani, sans-serif" text-anchor="middle">Erst eine Einheit erfasst — für einen Trend braucht es mindestens 2.</text>
      </svg>`;
    }
    const values = points.map(p => p.value);
    const reg = linearRegression(values);
    const forecastCount = 2;
    const totalCount = points.length + forecastCount;
    const forecastValues = [];
    if (reg) { for (let i = 0; i < forecastCount; i++) forecastValues.push(reg.slope * (points.length + i) + reg.intercept); }
    const allValues = values.concat(forecastValues);
    const minV = Math.min(...allValues, 0);
    const maxV = Math.max(...allValues) * 1.1 || 1;
    const xFor = (i) => padL + (i / (totalCount - 1)) * plotW;
    const yFor = (v) => padT + plotH - ((v - minV) / (maxV - minV || 1)) * plotH;
    let historyPath = 'M' + points.map((p, i) => `${xFor(i)},${yFor(p.value)}`).join(' L');
    let forecastPath = '';
    if (reg && forecastValues.length > 0) {
      forecastPath = 'M' + xFor(points.length - 1) + ',' + yFor(values[values.length - 1]) +
        ' L' + forecastValues.map((v, i) => `${xFor(points.length + i)},${yFor(v)}`).join(' L');
    }
    const dots = points.map((p, i) => `<circle cx="${xFor(i)}" cy="${yFor(p.value)}" r="3" fill="${color}"/>`).join('');
    const gridY = gridLines(minV, maxV, yFor);
    const firstLabel = points[0].date, lastLabel = points[points.length - 1].date;
    return `<svg width="100%" viewBox="0 0 ${width} ${height}" style="overflow:visible;">
      ${gridY}
      <path d="${historyPath}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" style="filter:drop-shadow(0 0 4px ${color})"/>
      ${forecastPath ? `<path d="${forecastPath}" fill="none" stroke="${color}" stroke-width="2" stroke-dasharray="4 4" opacity="0.6"/>` : ''}
      ${dots}
      <text x="${padL}" y="${height - 4}" font-size="10" fill="#5f7a94" font-family="Rajdhani, sans-serif">${firstLabel}</text>
      <text x="${width - padR}" y="${height - 4}" font-size="10" fill="#5f7a94" font-family="Rajdhani, sans-serif" text-anchor="end">${lastLabel}</text>
    </svg>`;
  }

  function stCleanup() {

  function stPlayTone(freq, duration, volume) {
    const ctx = getAudioCtx();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(ctx.destination);
    const now = ctx.currentTime;
    gain.gain.setValueAtTime(volume, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    osc.start(now);
    osc.stop(now + duration);
  }
  function stPlayStartTone() { stPlayTone(660, 0.35, 0.2); }
  function stPlayCountdownTone() { stPlayTone(880, 0.12, 0.18); }
  function stPlayTransitionTone() {
    stPlayTone(440, 0.25, 0.18);
    setTimeout(() => stPlayTone(550, 0.25, 0.18), 150);
    setTimeout(() => stPlayTone(660, 0.3, 0.2), 300);
  }
  function stSpeak(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'de-DE';
    window.speechSynthesis.speak(u);
  }
  function stSpeakUpcoming(e, side) {
    let text = e.name;
    if (e.side) text += side === 1 ? ", erste Seite" : ", zweite Seite";
    stSpeak(text);
  }

      listEl.innerHTML = exercises.map((e, i) => {
        const active = i === stIdx, done = stCompleted.has(i);
        return '<div class="st-list-item ' + (active ? 'active' : '') + ' ' + (done ? 'done' : '') + '" data-idx="' + i + '" role="button" tabindex="0">' +
          '<span class="st-li-name">' + (i + 1) + '. ' + e.name + (e.side ? ' (je Seite)' : '') + '</span>' +
          '<span class="st-li-time ' + (done ? 'done' : '') + '">' + stFmt(e.seconds) + (done ? ' ✓' : '') + '</span>' +
        '</div>';
      }).join('');
      listEl.querySelectorAll('.st-list-item').forEach(item => {
        item.onclick = () => jumpToExercise(parseInt(item.dataset.idx, 10));
      });
    }

    function jumpToExercise(i) {
      const exercises = stGetExercises();
      if (i < 0 || i >= exercises.length) return;
      stRunning = false;
      clearInterval(stTimerId);
      stIdx = i;
      stOnSide = 1;
      stPhase = 'exercise';
      btnStart.textContent = 'Start';
      runnerCard.style.display = 'block';
      doneBanner.style.display = 'none';
      loadExercise();
      smoothScrollToElement(runnerCard);
    }

    function loadExercise() {
      const exercises = stGetExercises();
      const e = exercises[stIdx];
      stRemaining = e.seconds;
      elName.textContent = e.name;
      elDesc.textContent = e.desc;
      elIndex.textContent = 'Übung ' + (stIdx + 1) + ' / ' + exercises.length;
      elSide.textContent = e.side ? (stOnSide === 1 ? 'Seite 1/2' : 'Seite 2/2') : '';
      const lightsEl = document.getElementById('st-side-lights');
      const light1 = document.getElementById('st-light-1');
      const light2 = document.getElementById('st-light-2');
      if (e.side) {
        lightsEl.style.display = 'inline-flex';
        // Light 1 lights up once side 1 is done (i.e. we're on side 2); light 2 once both are done.
        // The currently active side pulses to draw attention.
        light1.classList.toggle('lit', stOnSide === 2);
        light1.classList.toggle('current', stOnSide === 1);
        light2.classList.remove('lit');
        light2.classList.toggle('current', stOnSide === 2);
      } else {
        lightsEl.style.display = 'none';
      }
      renderTimerUI();
      renderList();
    }

    function renderTimerUI() {
      if (stPhase === 'transition') {
        elTime.textContent = String(stTransitionRemaining);
        elBar.style.width = ((10 - stTransitionRemaining) / 10 * 100) + '%';
      } else {
        const e = stGetExercises()[stIdx];
        elTime.textContent = stFmt(stRemaining);
        elBar.style.width = ((e.seconds - stRemaining) / e.seconds * 100) + '%';
      }
    }

    function stepIndex() {
      const exercises = stGetExercises();
      const e = exercises[stIdx];
      if (e.side && stOnSide === 1) { stOnSide = 2; return false; }
      stCompleted.add(stIdx);
      stOnSide = 1;
      if (stIdx < exercises.length - 1) { stIdx++; return false; }
      return true;
    }

    function finishRoutine() {
      stRunning = false;
      clearInterval(stTimerId);
      stPhase = 'exercise';
      runnerCard.style.display = 'none';
      doneBanner.style.display = 'block';
      stIdx = stGetExercises().length;
      renderList();
    }

    function pauseForManual() {
      stRunning = false;
      clearInterval(stTimerId);
      btnStart.textContent = 'Start';
      stPhase = 'exercise';
      renderTimerUI();
    }

    function enterTransition() {
      stPhase = 'transition';
      stTransitionRemaining = 10;
      stPlayTransitionTone();
      stSpeakUpcoming(stGetExercises()[stIdx], stOnSide);
      elIndex.textContent = 'Übergang';
      renderTimerUI();
    }

    function startExerciseTimer() {
      stPhase = 'exercise';
      stRemaining = stGetExercises()[stIdx].seconds;
      elIndex.textContent = 'Übung ' + (stIdx + 1) + ' / ' + stGetExercises().length;
      stPlayStartTone();
      renderTimerUI();
    }

    function onExerciseEnd() {
      const exercises = stGetExercises();
      const e = exercises[stIdx];
      const finishingSecondSide = e.side && stOnSide === 2;

      function advance() {
        const finished = stepIndex();
        if (finished) { finishRoutine(); return; }
        loadExercise();
        if (stAutoMode) enterTransition(); else pauseForManual();
      }

      if (finishingSecondSide) {
        clearInterval(stTimerId);
        const light1 = document.getElementById('st-light-1');
        const light2 = document.getElementById('st-light-2');
        if (light1) { light1.classList.remove('current'); light1.classList.add('lit'); }
        if (light2) { light2.classList.remove('current'); light2.classList.add('lit'); }
        setTimeout(() => {
          advance();
          if (stRunning) { stTimerId = setInterval(tick, 1000); }
        }, 650);
      } else {
        advance();
      }
    }

    function tick() {
      if (stPhase === 'exercise') {
        stRemaining--;
        if (stRemaining < 0) { onExerciseEnd(); return; }
        if (stRemaining <= 2) stPlayCountdownTone();
        renderTimerUI();
      } else {
        stTransitionRemaining--;
        if (stTransitionRemaining < 0) { startExerciseTimer(); return; }
        renderTimerUI();
      }
    }

    btnStart.onclick = () => {
      if (stIdx >= stGetExercises().length) return;
      stEnsureAudio();
      stRunning = !stRunning;
      btnStart.textContent = stRunning ? 'Pause' : 'Start';
      if (stRunning) {
        if (stPhase === 'exercise') {
          if (stFirstStart && stIdx === 0 && stOnSide === 1) {
            stFirstStart = false;
            stSpeakUpcoming(stGetExercises()[stIdx], stOnSide);
          }
          stPlayStartTone();
        }
        stTimerId = setInterval(tick, 1000);
      } else {
        clearInterval(stTimerId);
      }
    };

    btnSkip.onclick = () => {
      if (stIdx >= stGetExercises().length) return;
      if (stPhase === 'transition') startExerciseTimer(); else onExerciseEnd();
    };

    btnReset.onclick = () => {
      stRunning = false;
      clearInterval(stTimerId);
      stIdx = 0; stOnSide = 1; stPhase = 'exercise'; stFirstStart = true;
      stCompleted = new Set();
      btnStart.textContent = 'Start';
      runnerCard.style.display = 'block';
      doneBanner.style.display = 'none';
      loadExercise();
    };

    loadExercise();
  }

  async function switchDay(day) {
    currentDay = day;
    document.querySelectorAll('.tl-tab').forEach(t => t.classList.toggle('active', t.dataset.day === day));
    if (day !== 'stretching') stCleanup();
    if (day === 'overview') { await renderOverview(); return; }
    if (day === 'stretching') { renderStretchSelect(); return; }
    if (!dataCache[day]) {
      contentEl.innerHTML = '<div class="tl-loading">Lade...</div>';
      await loadDay(day);
    }
    render(day);
  }

  async function buildExportData() {
    await ensureAllDaysLoaded();
    const out = { exportedAt: new Date().toISOString(), version: 1, days: {} };
    for (const day of Object.keys(DAYS)) {
      const dayOut = { customExercises: customExercisesCache[day] || [], exercises: {} };
      DAYS[day].exercises.forEach((ex, i) => {
        dayOut.exercises[ex.id] = {
          name: ex.name,
          sets: dataCache[day][i],
          history: historyCache[day][i],
        };
      });
      out.days[day] = dayOut;
    }
    return out;
  }

  document.getElementById('tl-footer-toggle').onclick = () => {
    document.getElementById('tl-footer-panel').classList.toggle('open');
  };

  document.getElementById('tl-export-btn').onclick = async () => {
    statusEl.textContent = 'Exportiere...';
    const data = await buildExportData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'trainingslog-export-' + todayStr() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    statusEl.textContent = 'Export heruntergeladen';
    statusEl.classList.add('saved');
  };

  const importFileInput = document.getElementById('tl-import-file');
  const importModal = document.getElementById('tl-import-modal');
  let pendingImportData = null;

  document.getElementById('tl-import-btn').onclick = () => importFileInput.click();

  importFileInput.onchange = () => {
    const file = importFileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        pendingImportData = JSON.parse(reader.result);
        importModal.classList.add('open');
      } catch (e) {
        statusEl.textContent = 'Ungültige Datei';
      }
      importFileInput.value = '';
    };
    reader.readAsText(file);
  };

  document.getElementById('tl-import-cancel').onclick = () => {
    importModal.classList.remove('open');
    pendingImportData = null;
  };

  document.getElementById('tl-import-confirm').onclick = async () => {
    if (!pendingImportData) return;
    importModal.classList.remove('open');
    statusEl.textContent = 'Importiere...';
    await ensureAllDaysLoaded();
    const data = pendingImportData;
    for (const day of Object.keys(data.days || {})) {
      if (!DAYS[day]) continue;
      const dayData = data.days[day];

      const knownIds = new Set(DAYS[day].exercises.map(e => e.id));
      (dayData.customExercises || []).forEach(ex => {
        if (!knownIds.has(ex.id)) {
          DAYS[day].exercises.push(ex);
          customExercisesCache[day] = customExercisesCache[day] || [];
          customExercisesCache[day].push(ex);
          dataCache[day].push([{ reps: '', weight: '' }]);
          historyCache[day].push([]);
          knownIds.add(ex.id);
        }
      });
      await saveCustomExercises(day);

      for (const exId of Object.keys(dayData.exercises || {})) {
        const entry = dayData.exercises[exId];
        const exIndex = DAYS[day].exercises.findIndex(e => e.id === exId);
        if (exIndex === -1) continue;
        if (entry.sets) {
          dataCache[day][exIndex] = entry.sets;
          await window.storage.set(storageKey(day, exId), JSON.stringify(entry.sets), false);
        }
        if (entry.history) {
          historyCache[day][exIndex] = entry.history;
          await window.storage.set(historyKey(day, exId), JSON.stringify(entry.history), false);
        }
      }
    }
    pendingImportData = null;
    statusEl.textContent = 'Import abgeschlossen';
    statusEl.classList.add('saved');
    if (currentDay === 'overview') { await renderOverview(); } else { render(currentDay); }
  };

  switchDay(currentDay);
})();
</script>
