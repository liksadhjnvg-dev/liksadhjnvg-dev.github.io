<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainingslog</title>
<style>body{margin:0;background:#15171b;padding:12px 0;}</style>
</head>
<body>
<!-- Trainingslog: Push/Pull/Beine -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  #tl-root {
    --bg: #15171b;
    --surface: #1e2127;
    --surface-2: #272b32;
    --text: #edeef0;
    --text-muted: #8b8f96;
    --accent: #e8862e;
    --accent-dim: #3a2c1c;
    --border: #303540;
    --ok: #6fae6f;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    background: var(--bg);
    padding: 24px 16px 32px;
    border-radius: 16px;
    max-width: 780px;
    margin: 0 auto;
  }
  #tl-root * { box-sizing: border-box; }
  .tl-h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin: 0 0 4px;
  }
  .tl-sub { color: var(--text-muted); font-size: 13px; margin: 0 0 16px; }
  .tl-toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tl-tool-btn {
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
    background: none; color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 11px; cursor: pointer;
  }
  .tl-tool-btn:hover { color: var(--text); border-color: var(--text-muted); }
  .tl-tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tl-tab {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 10px 4px 12px;
    cursor: pointer;
    position: relative;
    flex: 1;
  }
  .tl-tab.active { color: var(--accent); }
  .tl-tab.active::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: var(--accent);
  }
  .tl-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--eq-color, var(--border));
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .tl-card-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 10px; }
  .tl-head-main { display: flex; justify-content: space-between; align-items: baseline; flex: 1; gap: 12px; }
  .tl-ex-name { font-weight: 500; font-size: 15px; }
  .tl-ex-equip { color: var(--text-muted); font-size: 12px; margin-top: 1px; }
  .tl-ex-muscles { color: var(--text-muted); font-size: 11px; margin-top: 2px; }
  .tl-volume {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    white-space: nowrap;
  }
  .tl-e1rm { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); white-space: nowrap; margin-top: 2px; }
  .tl-best { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #d9b23a; white-space: nowrap; margin-top: 2px; }
  .tl-pr-badge { color: #d9b23a; font-size: 11px; margin-left: 4px; }
  .tl-equip-icon {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface-2); border: 1.5px solid var(--icon-color, var(--border));
    margin-left: 12px;
  }
  .tl-deload {
    margin-bottom: 12px; padding: 8px 10px; border-radius: 8px; background: rgba(217,165,58,0.1);
    border: 1px solid rgba(217,165,58,0.4); color: #d9b23a; font-size: 12px; line-height: 1.5;
  }
  .tl-inner-tabs { display: flex; gap: 4px; margin-bottom: 12px; background: var(--surface-2); border-radius: 8px; padding: 3px; }
  .tl-inner-tab {
    flex: 1; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
    background: none; color: var(--text-muted); border: none; border-radius: 6px;
    padding: 7px 4px; cursor: pointer;
  }
  .tl-inner-tab.active { background: var(--surface); color: var(--accent); }
  .tl-panel { display: none; }
  .tl-panel.active { display: block; }
  .tl-set-row { display: grid; grid-template-columns: 24px 1fr 1fr 24px; gap: 8px; align-items: center; margin-bottom: 6px; }
  .tl-set-num { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-muted); text-align: center; }
  .tl-input {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    width: 100%;
  }
  .tl-input:focus { outline: none; border-color: var(--accent); }
  .tl-input::placeholder { color: var(--text-muted); }
  .tl-del {
    background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; line-height: 1;
    padding: 4px;
  }
  .tl-del:hover { color: #d9534f; }
  .tl-labels { display: grid; grid-template-columns: 24px 1fr 1fr 24px; gap: 8px; margin-bottom: 6px; }
  .tl-labels span { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
  .tl-add {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    background: var(--accent-dim);
    color: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    margin-top: 4px;
  }
  .tl-add:hover { filter: brightness(1.15); }
  .tl-finish {
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    background: none; color: var(--ok); border: 1px solid var(--ok); border-radius: 8px;
    padding: 8px 12px; cursor: pointer; margin-top: 10px; width: 100%;
  }
  .tl-finish:hover { background: rgba(111,174,111,0.12); }
  .tl-status {
    font-size: 12px; color: var(--text-muted); text-align: right; margin-top: 4px; min-height: 16px;
  }
  .tl-status.saved { color: var(--ok); }
  .tl-loading { color: var(--text-muted); font-size: 13px; padding: 20px 0; text-align: center; }
  .tl-history-empty { color: var(--text-muted); font-size: 12px; }
  .tl-hblock { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px dashed var(--border); }
  .tl-hblock:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .tl-hrow-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .tl-hdate { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
  .tl-hsummary { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent); text-align: right; }
  .tl-hsets { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .tl-guide ol { margin: 0; padding-left: 20px; }
  .tl-guide li { font-size: 13px; line-height: 1.6; color: var(--text); margin-bottom: 6px; }
  .tl-guide li::marker { color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
  .tl-goal-row { display: flex; align-items: center; gap: 8px; }
  .tl-goal-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .tl-goal-input { width: 70px; }
  .tl-goal-save {
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
    background: var(--accent-dim); color: var(--accent); border: none; border-radius: 6px;
    padding: 6px 10px; cursor: pointer;
  }
  .tl-goal-progress-wrap { margin-top: 12px; display: none; }
  .tl-goal-progress-track { background: var(--surface-2); border-radius: 4px; height: 8px; overflow: hidden; }
  .tl-goal-progress-fill { background: var(--accent); height: 100%; border-radius: 4px; }
  .tl-goal-progress-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .tl-newex-toggle {
    font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 0.3px;
    text-transform: uppercase; background: var(--surface); color: var(--accent);
    border: 1px dashed var(--accent); border-radius: 12px; padding: 14px; width: 100%; cursor: pointer;
    margin-top: 4px;
  }
  .tl-newex-toggle:hover { background: var(--accent-dim); }
  .tl-newex-form {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; margin-top: 4px; display: none;
  }
  .tl-newex-form.open { display: block; }
  .tl-form-row { margin-bottom: 12px; }
  .tl-form-row label { display: block; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 6px; }
  .tl-form-row select, .tl-form-row input { font-family: 'Inter', sans-serif; }
  .tl-form-actions { display: flex; gap: 8px; margin-top: 4px; }
  .tl-form-submit {
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    background: var(--accent); color: #1a1300; border: none; border-radius: 8px;
    padding: 9px 14px; cursor: pointer;
  }
  .tl-form-cancel {
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    background: none; color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 14px; cursor: pointer;
  }
  .tl-overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .tl-overview-card {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 4px solid var(--eq-color, var(--border));
    border-radius: 10px;
    padding: 14px 16px;
  }
  .tl-overview-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .tl-overview-name { font-weight: 500; font-size: 14px; }
  .tl-overview-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .tl-overview-muscles { color: var(--text-muted); font-size: 11px; margin-top: 2px; }
  .tl-overview-empty { color: var(--text-muted); font-size: 12px; padding: 4px 0; }
  .tl-overview-section {
    font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 15px; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--accent); margin: 22px 0 10px;
    border-bottom: 1px solid var(--border); padding-bottom: 6px;
  }
  .tl-overview-section:first-child { margin-top: 0; }
  .tl-modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none;
    align-items: center; justify-content: center; z-index: 1000; padding: 20px;
  }
  .tl-modal-backdrop.open { display: flex; }
  .tl-modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; max-width: 420px; width: 100%; color: var(--text); font-family: 'Inter', sans-serif;
  }
  .tl-modal h3 { font-family: 'Oswald', sans-serif; font-size: 16px; text-transform: uppercase; margin: 0 0 10px; }
  .tl-modal p { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin: 0 0 14px; }
  .tl-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>

<div id="tl-root">
  <div class="tl-h1">Trainingslog</div>
  <p class="tl-sub">Sätze, Wiederholungen und Gewicht pro Übung eintragen — wird automatisch gespeichert.</p>
  <div class="tl-toolbar">
    <button class="tl-tool-btn" id="tl-export-btn">Export (JSON)</button>
    <button class="tl-tool-btn" id="tl-import-btn">Import (JSON)</button>
    <input type="file" id="tl-import-file" accept="application/json" style="display:none;">
  </div>
  <div class="tl-tabs" id="tl-tabs"></div>
  <div id="tl-content"><div class="tl-loading">Lade...</div></div>
  <div class="tl-status" id="tl-status"></div>
</div>

<div class="tl-modal-backdrop" id="tl-import-modal">
  <div class="tl-modal">
    <h3>Import bestätigen</h3>
    <p>Diese Datei überschreibt vorhandene Einträge für gleichnamige Übungen (Sätze, Verlauf, Ziel). Neue Übungen aus der Datei werden ergänzt. Fortfahren?</p>
    <div class="tl-modal-actions">
      <button class="tl-form-cancel" id="tl-import-cancel">Abbrechen</button>
      <button class="tl-form-submit" id="tl-import-confirm">Importieren</button>
    </div>
  </div>
</div>

<script>
window.storage = {
  async get(key, shared) {
    const raw = localStorage.getItem('tl_' + key);
    if (raw === null) throw new Error('key not found');
    return { key: key, value: raw, shared: !!shared };
  },
  async set(key, value, shared) {
    localStorage.setItem('tl_' + key, value);
    return { key: key, value: value, shared: !!shared };
  },
  async delete(key, shared) {
    localStorage.removeItem('tl_' + key);
    return { key: key, deleted: true, shared: !!shared };
  },
  async list(prefix, shared) {
    const p = 'tl_' + (prefix || '');
    const keys = Object.keys(localStorage).filter(k => k.startsWith(p)).map(k => k.slice(3));
    return { keys: keys, prefix: prefix, shared: !!shared };
  }
};
(function() {
  const DAYS = {
    push: {
      label: 'Push',
      exercises: [
        { name: 'Kurzhantel-Bankdrücken', equip: 'Kurzhantel + Bank', pose: 'horizontal_press', id: 'kurzhantel-bankdruecken', muscles: { primary: 'Brust', secondary: 'Trizeps, vordere Schulter' }, steps: [
          'Auf der Bank liegen, Füße fest am Boden, Kurzhanteln über der Brust halten.',
          'Hanteln kontrolliert bis auf Brusthöhe absenken, Ellbogen ca. 45° zum Körper.',
          'Kurz unten pausieren, dann explosiv nach oben drücken bis die Arme fast gestreckt sind.',
          '3-4 Sätze x 6-8 Wiederholungen.'

        { name: 'Schrägbankdrücken', equip: 'Kurzhantel + Bank', pose: 'horizontal_press', id: 'schraegbankdruecken', muscles: { primary: 'Obere Brust', secondary: 'Vordere Schulter, Trizeps' }, steps: [

          '3 Sätze x 8-10 Wiederholungen.'
        ]},
        { name: 'Schulterdrücken', equip: 'Kurzhantel', pose: 'overhead_press', id: 'schulterdruecken', muscles: { primary: 'Vordere Schulter', secondary: 'Trizeps, oberer Trapezmuskel' }, steps: [
          'Aufrecht sitzen oder stehen, Kurzhanteln auf Schulterhöhe, Handflächen nach vorne.',
          'Hanteln über den Kopf drücken bis die Arme fast gestreckt sind, Rumpf stabil halten.',
          'Kontrolliert zurück auf Schulterhöhe absenken.',
          '3 Sätze x 8-10 Wiederholungen.'
        ]},
        { name: 'Seitheben', equip: 'Kurzhantel', pose: 'lateral_raise', id: 'seitheben', muscles: { primary: 'Seitliche Schulter', secondary: 'Vordere Schulter, Trapezmuskel' }, steps: [
          'Aufrecht stehen, Kurzhanteln seitlich am Körper, leichte Ellbogenbeugung.',
          'Arme seitlich bis Schulterhöhe anheben, keinen Schwung aus dem Rücken nutzen.',
          'Kurz oben halten, dann langsam absenken.',
          '3 Sätze x 12-15 Wiederholungen.'
        ]},
        { name: 'Trizepsdrücken', equip: 'Widerstandsband', pose: 'triceps_overhead', id: 'trizepsdruecken', type: 'band', muscles: { primary: 'Trizeps', secondary: '–' }, steps: [
          'Widerstandsband über Kopf oder an einer Tür befestigen, Ellbogen nah am Kopf.',

          'Zurück nach oben strecken.',
          '2-3 Sätze x 12-15 Wiederholungen.'

      ]
    },
    pull: {
      label: 'Pull',
      exercises: [
        { name: 'Kurzhantel-Kreuzheben', equip: 'Kurzhantel', pose: 'hinge_deadlift', id: 'kurzhantel-kreuzheben', muscles: { primary: 'Unterer Rücken, Gesäß', secondary: 'Beinbeuger, Trapezmuskel' }, steps: [

          'Hüfte nach hinten schieben, Rücken gerade, Hanteln nah am Bein entlang absenken.',

        { name: 'Bulgarian Split Squats', equip: 'Kurzhantel + Bank', pose: 'lunge', id: 'bulgarian-split-squats', muscles: { primary: 'Quadrizeps', secondary: 'Gesäß, Beinbeuger' }, steps: [

        { name: 'Ausfallschritte', equip: 'Kurzhantel', pose: 'lunge', id: 'ausfallschritte', muscles: { primary: 'Quadrizeps', secondary: 'Gesäß, Beinbeuger' }, steps: [

  async function loadDay(day) {
    if (!DAYS[day]._merged) {
      const custom = await loadCustomExercises(day);
      customExercisesCache[day] = custom;
      custom.forEach(ex => DAYS[day].exercises.push(ex));
      DAYS[day]._merged = true;
    }
    const exercises = DAYS[day].exercises;
    const sets = [];
    const histories = [];
    for (let i = 0; i < exercises.length; i++) {
      const ex = exercises[i];
      let setsVal = null, histVal = null;
      try {
        const res = await window.storage.get(storageKey(day, ex.id), false);
        setsVal = res && res.value ? JSON.parse(res.value) : null;
      } catch (e) { /* not found under new key */ }
      try {
        const hres = await window.storage.get(historyKey(day, ex.id), false);
        histVal = hres && hres.value ? JSON.parse(hres.value) : null;
      } catch (e) { /* not found under new key */ }

      if (setsVal === null) {
        try {
          const legacyRes = await window.storage.get(legacyStorageKey(day, i), false);
          if (legacyRes && legacyRes.value) {
            setsVal = JSON.parse(legacyRes.value);
            await window.storage.set(storageKey(day, ex.id), legacyRes.value, false);
          }
        } catch (e) { /* nothing to migrate */ }
      }
      if (histVal === null) {
        try {
          const legacyHRes = await window.storage.get(legacyHistoryKey(day, i), false);
          if (legacyHRes && legacyHRes.value) {
            histVal = JSON.parse(legacyHRes.value);
            await window.storage.set(historyKey(day, ex.id), legacyHRes.value, false);
          }
        } catch (e) { /* nothing to migrate */ }
      }

      sets.push(setsVal || [{ reps: '', weight: '' }]);

  function computeVolume(sets) {
    let total = 0;
    sets.forEach(s => { total += (parseFloat(s.reps) || 0) * (parseFloat(s.weight) || 0); });
    return total;
  }

  function computeMetric(ex, sets) {
    if (ex.type === 'band') {
      const totalReps = sets.reduce((sum, s) => sum + (parseFloat(s.reps) || 0), 0);
      return 'Wiederholungen: ' + totalReps;
    }
    return 'Volumen: ' + computeVolume(sets) + ' kg';
  }

  function calcE1RM(weight, reps) {
    const w = parseFloat(weight) || 0, r = parseFloat(reps) || 0;
    if (w <= 0 || r <= 0) return 0;
    return w * (1 + r / 30);
  }

  function lastSessionE1RM(ex, history) {
    if (ex.type === 'band' || !history || history.length === 0) return null;
    const last = history[history.length - 1];
    if (!last.sets || last.sets.length === 0) return null;
    let max = 0;
    last.sets.forEach(s => { const e = calcE1RM(s.weight, s.reps); if (e > max) max = e; });
    if (max <= 0) return null;
    return { value: Math.round(max * 10) / 10, date: last.date };
  }

  function e1rmLabel(ex, history) {
    const r = lastSessionE1RM(ex, history);
    if (!r) return ex.type === 'band' ? '' : 'e1RM: –';
    return 'e1RM (' + r.date + '): ' + r.value + ' kg';
  }

  function sessionValue(ex, entry) {
    if (!entry) return 0;
    if (ex.type === 'band') return entry.totalReps || 0;
    if (!entry.sets || entry.sets.length === 0) return entry.topWeight || 0;
    let max = 0;
    entry.sets.forEach(s => { const e = calcE1RM(s.weight, s.reps); if (e > max) max = e; });
    return Math.round(max * 10) / 10;
  }

  function bestSession(ex, history) {
    if (!history || history.length === 0) return null;
    let best = null;
    history.forEach(h => {
      const v = sessionValue(ex, h);
      if (!best || v > best.value) best = { value: v, date: h.date };
    });
    return best;
  }

  function bestLabel(ex, history) {
    const b = bestSession(ex, history);
    if (!b || b.value <= 0) return '';
    return 'Bestwert (' + b.date + '): ' + b.value + (ex.type === 'band' ? ' Wdh.' : ' kg');
  }

  function deloadNote(ex, history) {
    if (!history || history.length < 3) return '';

  function linearRegression(values) {
    const n = values.length;
    if (n < 2) return null;
    let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
    for (let i = 0; i < n; i++) { sumX += i; sumY += values[i]; sumXY += i * values[i]; sumXX += i * i; }
    const denom = (n * sumXX - sumX * sumX);
    if (denom === 0) return null;
    const slope = (n * sumXY - sumX * sumY) / denom;
    const intercept = (sumY - slope * sumX) / n;
    return { slope, intercept };
  }

  function trendChartSvg(points, unit, color) {
    const width = 560, height = 140, padL = 36, padR = 16, padT = 14, padB = 22;
    const plotW = width - padL - padR, plotH = height - padT - padB;
    if (points.length === 0) return `<div class="tl-overview-empty">Noch keine abgeschlossenen Einheiten.</div>`;
    if (points.length === 1) return `<div class="tl-overview-empty">Erst eine Einheit erfasst (${points[0].value} ${unit}) — für einen Trend braucht es mindestens 2.</div>`;
    const values = points.map(p => p.value);
    const reg = linearRegression(values);
    const forecastCount = 2;
    const totalCount = points.length + forecastCount;
    const forecastValues = [];
    if (reg) { for (let i = 0; i < forecastCount; i++) forecastValues.push(reg.slope * (points.length + i) + reg.intercept); }
    const allValues = values.concat(forecastValues);
    const minV = Math.min(...allValues, 0);
    const maxV = Math.max(...allValues) * 1.1 || 1;
    const xFor = (i) => padL + (i / (totalCount - 1)) * plotW;
    const yFor = (v) => padT + plotH - ((v - minV) / (maxV - minV || 1)) * plotH;
    let historyPath = 'M' + points.map((p, i) => `${xFor(i)},${yFor(p.value)}`).join(' L');
    let forecastPath = '';
    if (reg && forecastValues.length > 0) {
      forecastPath = 'M' + xFor(points.length - 1) + ',' + yFor(values[values.length - 1]) +
        ' L' + forecastValues.map((v, i) => `${xFor(points.length + i)},${yFor(v)}`).join(' L');
    }
    const dots = points.map((p, i) => `<circle cx="${xFor(i)}" cy="${yFor(p.value)}" r="3" fill="${color}"/>`).join('');
    const gridY = [0, 0.5, 1].map(t => {
      const v = minV + t * (maxV - minV);
      const y = yFor(v);
      return `<line x1="${padL}" y1="${y}" x2="${width - padR}" y2="${y}" stroke="#303540" stroke-width="1"/><text x="4" y="${y + 4}" font-size="10" fill="#8b8f96" font-family="IBM Plex Mono, monospace">${Math.round(v)}</text>`;
    }).join('');
    const firstLabel = points[0].date, lastLabel = points[points.length - 1].date;
    return `<svg width="100%" viewBox="0 0 ${width} ${height}" style="overflow:visible;">
      ${gridY}
      <path d="${historyPath}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${forecastPath ? `<path d="${forecastPath}" fill="none" stroke="${color}" stroke-width="2" stroke-dasharray="4 4" opacity="0.55"/>` : ''}
      ${dots}
      <text x="${padL}" y="${height - 4}" font-size="10" fill="#8b8f96" font-family="Inter, sans-serif">${firstLabel}</text>
      <text x="${width - padR}" y="${height - 4}" font-size="10" fill="#8b8f96" font-family="Inter, sans-serif" text-anchor="end">${lastLabel}</text>
    </svg>`;
  }

          row.appendChild(weightInput);

          const del = document.createElement('button');
          del.className = 'tl-del';
          del.textContent = '\u00d7';
          del.setAttribute('aria-label', 'Satz entfernen');
          del.onclick = () => {
            if (sets.length > 1) {
              sets.splice(setIndex, 1);
              renderRows();
              head.querySelector('[data-vol]').textContent = computeMetric(ex, sets);
              saveExercise(day, ex, sets);
            }
          };
          row.appendChild(del);
          rowsWrap.appendChild(row);
        });
      }
      renderRows();
      saetzePanel.appendChild(rowsWrap);

      const addBtn = document.createElement('button');
      addBtn.className = 'tl-add';
      addBtn.textContent = '+ Satz hinzufügen';
      addBtn.onclick = () => {
        sets.push({ reps: '', weight: '' });
        renderRows();
        saveExercise(day, ex, sets);
      };
      saetzePanel.appendChild(addBtn);

      const finishBtn = document.createElement('button');
      finishBtn.className = 'tl-finish';
      finishBtn.textContent = 'Einheit abschließen';
      finishBtn.onclick = async () => {
        const validSets = sets.filter(s => s.reps !== '' && s.weight !== '');
        if (validSets.length === 0) return;
        const history = historyCache[day][exIndex];
        const today = todayStr();
        const existingIdx = history.findIndex(h => h.date === today);
        let entry;
        if (ex.type === 'band') {
          const totalReps = validSets.reduce((sum, s) => sum + (parseFloat(s.reps) || 0), 0);
          const order = { orange: 1, gruen: 2, blau: 3 };
          const topLevelKey = validSets.reduce((top, s) => (order[s.weight] > order[top] ? s.weight : top), 'orange');
          entry = { date: today, type: 'band', totalReps, topLevel: topLevelKey, sets: validSets.map(s => ({ reps: s.reps, weight: s.weight })) };
        } else {
          const volume = computeVolume(validSets);
          const topWeight = Math.max(...validSets.map(s => parseFloat(s.weight) || 0));
          entry = { date: today, type: 'weight', volume, topWeight, sets: validSets.map(s => ({ reps: s.reps, weight: s.weight })) };
        }
        if (existingIdx >= 0) history[existingIdx] = entry; else history.push(entry);
        history.sort((a, b) => a.date.localeCompare(b.date));
        await saveHistory(day, ex);
        renderHistory();
        head.querySelector('[data-e1rm]').textContent = e1rmLabel(ex, history);
        head.querySelector('[data-best]').textContent = bestLabel(ex, history);
        renderDeload();
        const g = await loadGoal(day, ex);
        if (g) renderGoalProgress(g);
        statusEl.textContent = 'Einheit gespeichert';
        statusEl.classList.add('saved');
      };
      saetzePanel.appendChild(finishBtn);
      card.appendChild(saetzePanel);

      const historyEl = document.createElement('div');
      historyEl.className = 'tl-panel';
      panels['verlauf'] = historyEl;
      function renderHistory() {
        const history = historyCache[day][exIndex];
        historyEl.innerHTML = '';
        if (history.length === 0) {
          historyEl.innerHTML = '<div class="tl-history-empty">Noch keine abgeschlossenen Einheiten.</div>';
          return;
        }
        const recent = history.slice(-8).reverse();
        const best = bestSession(ex, history);
        recent.forEach(h => {
          const block = document.createElement('div');
          block.className = 'tl-hblock';
          const top = document.createElement('div');
          top.className = 'tl-hrow-top';
          const isPR = best && sessionValue(ex, h) === best.value && best.value > 0;
          const summary = h.type === 'band'
            ? h.totalReps + ' Wdh. gesamt · Top-Stufe: ' + bandLevel(h.topLevel).label
            : h.volume + ' kg Volumen · Top: ' + h.topWeight + ' kg';
          top.innerHTML = `<span class="tl-hdate">${h.date}${isPR ? '<span class="tl-pr-badge" title="Bestwert">🏆</span>' : ''}</span><span class="tl-hsummary">${summary}</span>`;
          block.appendChild(top);
          const setsLine = document.createElement('div');
          setsLine.className = 'tl-hsets';
          setsLine.textContent = (h.sets || []).map(s => {
            if (h.type === 'band') {
              const lvl = bandLevel(s.weight);
              return s.reps + '× ' + (lvl ? lvl.label.split(' ·')[0] : s.weight);
            }
            return s.reps + '×' + s.weight + 'kg';
          }).join('  ·  ');
          block.appendChild(setsLine);
          historyEl.appendChild(block);
        });
      }
      renderHistory();
      card.appendChild(historyEl);

      const guideEl = document.createElement('div');
      guideEl.className = 'tl-panel tl-guide';
      panels['anleitung'] = guideEl;
      if (ex.steps && ex.steps.length > 0) {
        const stepsList = document.createElement('ol');
        ex.steps.forEach(step => {
          const li = document.createElement('li');
          li.textContent = step;
          stepsList.appendChild(li);
        });
        guideEl.appendChild(stepsList);
      } else {
        guideEl.innerHTML = '<div class="tl-history-empty">Noch keine Anleitung für diese Übung hinterlegt.</div>';
      }
      card.appendChild(guideEl);

      const goalWrap = document.createElement('div');
      goalWrap.className = 'tl-panel';
      panels['ziel'] = goalWrap;
      const goalUnit = ex.type === 'band' ? 'Wdh.' : 'kg';
      goalWrap.innerHTML = `
        <div class="tl-goal-row">
          <span class="tl-goal-label">Ziel (${goalUnit}):</span>
          <input type="number" class="tl-input tl-goal-input" min="0" placeholder="z.B. ${ex.type === 'band' ? '150' : '40'}">
          <button class="tl-goal-save">Speichern</button>
        </div>
        <div class="tl-goal-progress-wrap">
          <div class="tl-goal-progress-track"><div class="tl-goal-progress-fill" style="width:0%"></div></div>
          <div class="tl-goal-progress-label"></div>
        </div>
      `;
      card.appendChild(goalWrap);
      const goalInput = goalWrap.querySelector('.tl-goal-input');
      const goalSaveBtn = goalWrap.querySelector('.tl-goal-save');
      const goalProgressWrap = goalWrap.querySelector('.tl-goal-progress-wrap');
      const goalProgressFill = goalWrap.querySelector('.tl-goal-progress-fill');
      const goalProgressLabel = goalWrap.querySelector('.tl-goal-progress-label');
      function renderGoalProgress(goalValue) {
        if (!goalValue || goalValue <= 0) { goalProgressWrap.style.display = 'none'; return; }
        const best = bestSession(ex, historyCache[day][exIndex]);
        const current = best ? best.value : 0;
        const pct = Math.min(100, Math.round((current / goalValue) * 100));
        goalProgressFill.style.width = pct + '%';
        goalProgressLabel.textContent = current + ' / ' + goalValue + ' ' + goalUnit + ' (' + pct + '%)';
        goalProgressWrap.style.display = 'block';
      }
      (async () => {
        const g = await loadGoal(day, ex);
        if (g) { goalInput.value = g; renderGoalProgress(g); }
      })();
      goalSaveBtn.onclick = async () => {
        const v = parseFloat(goalInput.value);
        if (!v || v <= 0) return;
        await saveGoal(day, ex, v);
        renderGoalProgress(v);
      };

      contentEl.appendChild(card);
    });

    const EQUIP_OPTIONS = [
      { equip: 'Kurzhantel', type: 'weight' },
      { equip: 'Kurzhantel + Bank', type: 'weight' },
      { equip: 'SZ-Stange', type: 'weight' },
      { equip: 'Kurzhantel + Korkblock', type: 'weight' },
      { equip: 'Widerstandsband', type: 'band' },
    ];

    const newExToggle = document.createElement('button');
    newExToggle.className = 'tl-newex-toggle';
    newExToggle.textContent = '+ Neue Übung';
    const newExForm = document.createElement('div');
    newExForm.className = 'tl-newex-form';

    const nameRow = document.createElement('div');
    nameRow.className = 'tl-form-row';
    nameRow.innerHTML = '<label>Name der Übung</label>';
    const nameInput = document.createElement('input');
    nameInput.className = 'tl-input';
    nameInput.placeholder = 'z.B. Klimmzüge mit Band';
    nameRow.appendChild(nameInput);

    const equipRow = document.createElement('div');
    equipRow.className = 'tl-form-row';
    equipRow.innerHTML = '<label>Ausrüstung</label>';
    const equipSelect = document.createElement('select');
    equipSelect.className = 'tl-input';
    EQUIP_OPTIONS.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.equip; opt.textContent = o.equip;
      equipSelect.appendChild(opt);
    });
    equipRow.appendChild(equipSelect);

    const formActions = document.createElement('div');
    formActions.className = 'tl-form-actions';
    const submitBtn = document.createElement('button');
    submitBtn.className = 'tl-form-submit';
    submitBtn.textContent = 'Übung hinzufügen';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'tl-form-cancel';
    cancelBtn.textContent = 'Abbrechen';
    formActions.appendChild(submitBtn);
    formActions.appendChild(cancelBtn);

    newExForm.appendChild(nameRow);
    newExForm.appendChild(equipRow);
    newExForm.appendChild(formActions);

    newExToggle.onclick = () => newExForm.classList.toggle('open');
    cancelBtn.onclick = () => { newExForm.classList.remove('open'); nameInput.value = ''; };
    submitBtn.onclick = async () => {
      const name = nameInput.value.trim();
      if (!name) { nameInput.focus(); return; }
      const chosen = EQUIP_OPTIONS.find(o => o.equip === equipSelect.value);
      const id = uniqueId(day, slugify(name));
      const newEx = { name: name, equip: chosen.equip, pose: 'default', id: id, type: chosen.type, steps: [] };
      DAYS[day].exercises.push(newEx);
      customExercisesCache[day] = customExercisesCache[day] || [];
      customExercisesCache[day].push(newEx);
      await saveCustomExercises(day);
      dataCache[day].push([{ reps: '', weight: '' }]);
      historyCache[day].push([]);
      nameInput.value = '';
      newExForm.classList.remove('open');
      render(day);
    };

    contentEl.appendChild(newExToggle);
    contentEl.appendChild(newExForm);
  }

  async function switchDay(day) {
    currentDay = day;
    document.querySelectorAll('.tl-tab').forEach(t => t.classList.toggle('active', t.dataset.day === day));
    if (day === 'overview') { await renderOverview(); return; }
    if (!dataCache[day]) {
      contentEl.innerHTML = '<div class="tl-loading">Lade...</div>';
      await loadDay(day);
    }
    render(day);
  }

  async function buildExportData() {
    await ensureAllDaysLoaded();
    const out = { exportedAt: new Date().toISOString(), version: 1, days: {} };
    for (const day of Object.keys(DAYS)) {
      const dayOut = { customExercises: customExercisesCache[day] || [], exercises: {} };
      DAYS[day].exercises.forEach((ex, i) => {
        dayOut.exercises[ex.id] = {
          name: ex.name,
          sets: dataCache[day][i],
          history: historyCache[day][i],
        };
      });
      out.days[day] = dayOut;
    }
    return out;
  }

  document.getElementById('tl-export-btn').onclick = async () => {
    statusEl.textContent = 'Exportiere...';
    const data = await buildExportData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'trainingslog-export-' + todayStr() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    statusEl.textContent = 'Export heruntergeladen';
    statusEl.classList.add('saved');
  };

  const importFileInput = document.getElementById('tl-import-file');
  const importModal = document.getElementById('tl-import-modal');
  let pendingImportData = null;

  document.getElementById('tl-import-btn').onclick = () => importFileInput.click();

  importFileInput.onchange = () => {
    const file = importFileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        pendingImportData = JSON.parse(reader.result);
        importModal.classList.add('open');
      } catch (e) {
        statusEl.textContent = 'Ungültige Datei';
      }
      importFileInput.value = '';
    };
    reader.readAsText(file);
  };

  document.getElementById('tl-import-cancel').onclick = () => {
    importModal.classList.remove('open');
    pendingImportData = null;
  };

  document.getElementById('tl-import-confirm').onclick = async () => {
    if (!pendingImportData) return;
    importModal.classList.remove('open');
    statusEl.textContent = 'Importiere...';
    await ensureAllDaysLoaded();
    const data = pendingImportData;
    for (const day of Object.keys(data.days || {})) {
      if (!DAYS[day]) continue;
      const dayData = data.days[day];

      const knownIds = new Set(DAYS[day].exercises.map(e => e.id));
      (dayData.customExercises || []).forEach(ex => {
        if (!knownIds.has(ex.id)) {
          DAYS[day].exercises.push(ex);
          customExercisesCache[day] = customExercisesCache[day] || [];
          customExercisesCache[day].push(ex);
          dataCache[day].push([{ reps: '', weight: '' }]);
          historyCache[day].push([]);
          knownIds.add(ex.id);
        }
      });
      await saveCustomExercises(day);

      for (const exId of Object.keys(dayData.exercises || {})) {
        const entry = dayData.exercises[exId];
        const exIndex = DAYS[day].exercises.findIndex(e => e.id === exId);
        if (exIndex === -1) continue;
        if (entry.sets) {
          dataCache[day][exIndex] = entry.sets;
          await window.storage.set(storageKey(day, exId), JSON.stringify(entry.sets), false);
        }
        if (entry.history) {
          historyCache[day][exIndex] = entry.history;
          await window.storage.set(historyKey(day, exId), JSON.stringify(entry.history), false);
        }
      }
    }
    pendingImportData = null;
    statusEl.textContent = 'Import abgeschlossen';
    statusEl.classList.add('saved');
    if (currentDay === 'overview') { await renderOverview(); } else { render(currentDay); }
  };

  switchDay(currentDay);
})();
</script>

</body>
</html>
